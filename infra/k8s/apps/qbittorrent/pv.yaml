apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
  name: pv-qbittorrent-smb
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb-media
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
  csi:
    driver: smb.csi.k8s.io
    readOnly: false
    # make sure this value is unique for every share in the cluster
    volumeHandle: csi-qbittorrent-smb
    volumeAttributes:
      source: "//smb-server.external-services.svc.cluster.local/data/media"
    nodeStageSecretRef:
      name: smb-creds
      namespace: qbittorrent
