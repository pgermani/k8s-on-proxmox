# Replace all placeholders before applying:
#   <VPN-HOSTNAME>.<YOUR-DOMAIN>  - public hostname for Headscale/Headplane (e.g. headscale.example.com)
#   <MAGIC-DNS-DOMAIN>  - Headscale Magic DNS base domain (e.g. example.myhomelab)
# See docs/k8s/apps/headscale.md
apiVersion: v1
kind: ConfigMap
metadata:
  name: headscale-config
  namespace: headscale
data:
  config.yaml: |
    server_url: https://<VPN-HOSTNAME>.<YOUR-DOMAIN>

    listen_addr: 0.0.0.0:8080
    metrics_listen_addr: 0.0.0.0:9090
    grpc_listen_addr: 127.0.0.1:50443
    grpc_allow_insecure: false

    noise:
      private_key_path: /var/lib/headscale/noise_private.key

    prefixes:
      v4: 100.64.0.0/10
      v6: fd7a:115c:a1e0::/48
      allocation: sequential

    derp:
      server:
        enabled: false
      urls:
        - https://controlplane.tailscale.com/derpmap/default
      paths: []
      auto_update_enabled: true
      update_frequency: 24h

    disable_check_updates: false
    ephemeral_node_inactivity_timeout: 30m

    database:
      type: sqlite
      debug: false
      gorm:
        prepare_stmt: true
        parameterized_queries: true
        skip_err_record_not_found: true
        slow_threshold: 1000
      sqlite:
        path: /var/lib/headscale/db.sqlite
        write_ahead_log: true
        wal_autocheckpoint: 1000

    log:
      format: text
      level: info

    policy:
      mode: database
      path: ""

    dns:
      magic_dns: true
      base_domain: <MAGIC-DNS-DOMAIN>
      override_local_dns: false
      nameservers:
        global:
          - 1.1.1.1
          - 1.0.0.1
          - 8.8.8.8
          - 8.8.4.4
        split: {}
      search_domains: []
      extra_records_path: /var/lib/headscale/extra-records.json

    unix_socket: /var/run/headscale/headscale.sock
    unix_socket_permission: "0770"

    logtail:
      enabled: false

    randomize_client_port: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: headplane-config
  namespace: headscale
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 3000
      base_url: "https://<VPN-HOSTNAME>.<YOUR-DOMAIN>"
      cookie_secret_path: "/etc/headplane/secrets/cookie_secret"
      cookie_secure: true
      cookie_max_age: 86400
      data_path: "/var/lib/headplane"

    headscale:
      url: "http://localhost:8080"
      public_url: "https://<VPN-HOSTNAME>.<YOUR-DOMAIN>"
      config_path: "/etc/headscale/config.yaml"
      dns_records_path: "/var/lib/headscale/extra-records.json"

    integration:
      agent:
        enabled: false
        pre_authkey: "unused-because-agent-disabled"
      kubernetes:
        enabled: false
        pod_name: "headscale"
        validate_manifest: false
      docker:
        enabled: false
      proc:
        enabled: false
