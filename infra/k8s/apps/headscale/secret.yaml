# Replace <COOKIE-SECRET> with a random 32-character hex string before applying.
# Generate with: openssl rand -hex 16
#
# The api_key is generated after Headscale starts for the first time:
#   kubectl -n headscale exec deploy/headscale -c headscale -- headscale apikeys create
# See docs/k8s/apps/headscale.md for the full post-deploy steps.
apiVersion: v1
kind: Secret
metadata:
  name: headplane-secrets
  namespace: headscale
type: Opaque
stringData:
  cookie_secret: "<COOKIE-SECRET>"
