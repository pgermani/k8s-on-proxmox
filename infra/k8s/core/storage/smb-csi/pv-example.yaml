# PersistentVolume template for an SMB-backed static volume.
# See docs/k8s/storage/smb-csi.md
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: smb.csi.k8s.io
  name: pv-<app>-smb-<pool>
spec:
  capacity:
    storage: <SHARE-SIZE>
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: smb-<pool>-<dataset>
  mountOptions:
    - dir_mode=0777
    - file_mode=0777
  csi:
    driver: smb.csi.k8s.io
    readOnly: false
    volumeHandle: <app>-smb-<pool>
    volumeAttributes:
      source: "//smb-server.external-services.svc.cluster.local/<SHARE-NAME>/<SUB-PATH>"
    nodeStageSecretRef:
      name: smb-creds
      namespace: <namespace>
