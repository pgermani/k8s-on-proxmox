# Test Pod for the nfs-subdir-external-provisioner, see docs/k8s/storage/nfs-provisioner.md
apiVersion: v1
kind: Pod
metadata:
  name: nfs-test-pod
  namespace: default
spec:
  containers:
    - name: test
      image: busybox
      command:
        - "sh"
        - "-c"
        - |
          touch /mnt/test.log
          while true; do
            date >> /mnt/test.log
            tail -n 1 /mnt/test.log
            sleep 10
          done
      volumeMounts:
        - name: test-vol
          mountPath: /mnt
  volumes:
    - name: test-vol
      persistentVolumeClaim:
        claimName: test-pvc
