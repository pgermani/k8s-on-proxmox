# Production ClusterIssuer - uses Let's Encrypt production ACME server.
# Apply only after validating the setup with the staging issuer.
# See docs/k8s/core/cert-manager-cloudflare.md
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns-prod
  namespace: cert-manager
spec:
  acme:
    email: <YOUR-EMAIL>
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns-prod-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
