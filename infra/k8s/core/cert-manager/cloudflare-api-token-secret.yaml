# Cloudflare API token used by cert-manager for DNS-01 challenges.
# Replace <CLOUDFLARE-API-TOKEN> with the token created in Cloudflare dashboard.
# See docs/k8s/core/cert-manager-cloudflare.md
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
stringData:
  api-token: "<CLOUDFLARE-API-TOKEN>"
